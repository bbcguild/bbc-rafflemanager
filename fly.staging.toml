app = 'bbcguilds-staging'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.production'

[deploy]
  strategy = 'immediate'

[env]
  APP_ENV = 'staging'
  APP_STAGE_LABEL = 'STAGING'
  DATABASE_PATH = '/data/raffle.db'
  GA4_MEASUREMENT_ID = 'G-8C00Y7WF9G'
  IMPORT_PATH = '/data/import'
  LOG_LEVEL = 'INFO'
  PYRAMID_DEBUG = '0'
  PYTHONPATH = '/app'

[processes]
  app = '/app/startup.sh'

[[mounts]]
  source = 'raffle_data_staging_ewr'
  destination = '/data'
  initial_size = '2gb'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[restart]]
  policy = 'on-failure'

[[vm]]
  memory = '512mb'
  cpus = 1
  cpu_kind = 'shared'
